<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-6">
                <div class="text-center mb-4">
                    <img src="../img/logo.jpg" alt="Logo" class="h-20 w-auto mx-auto">
                </div>
                <h2 class="text-2xl font-bold text-center mb-1">Welcome Back</h2>
                <p class="text-center text-blue-100">Sign in to your account</p>
            </div>
            <div class="p-6">
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-900 mb-2">Username or Email</label>
                        <div class="flex">
                            <span class="inline-flex items-center px-3 bg-gray-100 text-gray-600 border border-gray-300 rounded-l-lg">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" id="username" name="username" class="flex-1 px-4 py-2 border border-gray-300 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter your username or email" required autocomplete="username">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
                        <div class="flex">
                            <span class="inline-flex items-center px-3 bg-gray-100 text-gray-600 border border-gray-300 rounded-l-lg">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" class="flex-1 px-4 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter your password" required autocomplete="current-password">
                            <button class="px-3 bg-gray-100 text-gray-600 border border-gray-300 rounded-r-lg hover:bg-gray-50 transition" type="button" id="togglePassword">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- CAPTCHA Section -->
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-900 mb-2">Security Check</label>
                        <div class="flex gap-2">
                            <div class="bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 font-bold text-blue-600 flex items-center justify-center min-w-max" id="captchaQuestion" style="min-width: 80px;"></div>
                            <input type="number" id="captchaInput" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Answer" required>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">Please solve the math problem.</p>
                    </div>
                    
                    <div class="text-center mb-4">
                        <a href="forgot-password.html" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Forgot Password?</a>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:shadow-lg text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 transform hover:-translate-y-0.5">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>

                </form>

                <!-- OTP Form (Hidden by default) -->
                <form id="otpForm" style="display: none;">
                    <div class="mb-4 text-center">
                        <i class="fas fa-shield-alt text-4xl text-blue-600 mb-3 inline-block"></i>
                        <h5 class="text-lg font-bold text-gray-900 mt-2">Two-Factor Authentication</h5>
                        <p class="text-gray-500 text-xs mt-1">An OTP has been sent to your email. Please enter it below.</p>
                    </div>
                    <div class="mb-4">
                        <input type="text" id="otpInput" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-2xl font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent tracking-widest" placeholder="000000" maxlength="6" pattern="\d*">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:shadow-lg text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 transform hover:-translate-y-0.5">Verify OTP</button>
                    <button type="button" class="w-full text-blue-600 hover:text-blue-700 font-medium py-2 px-4 mt-2 rounded-lg hover:bg-blue-50 transition" id="backToLogin">Back to Login</button>
                </form>

                <div id="message" class="hidden px-4 py-3 rounded-lg bg-red-100 text-red-700 border border-red-300 text-sm"></div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
