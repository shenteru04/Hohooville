<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Print Trainee Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { color: #0f172a; }
        .field-value {
            display: block;
            min-height: 1.8rem;
            border-bottom: 1px solid #334155;
            padding: 0.2rem 0;
        }
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; background: #fff !important; }
            .field-value { border-bottom-color: #000; }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6" id="printContainer">
        <div class="no-print mb-4 flex items-center justify-between">
            <button class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="printBtn">
                <i class="fas fa-print"></i> Print
            </button>
        </div>

        <div class="overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-sm">
            <div class="bg-gradient-to-r from-blue-600 to-blue-500 px-6 py-4 text-center text-white">
                <h1 class="text-xl font-bold"><i class="fas fa-user-graduate mr-2"></i>Trainee Registration Form</h1>
                <p class="text-sm text-blue-100">(Approved - Printable Copy)</p>
            </div>

            <div class="space-y-4 p-4 sm:p-6" id="formBody">
                <div id="errorMessage" class="hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
                <div id="formContent" class="text-sm text-slate-700">Loading...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const traineeId = getQueryParam('trainee_id') || getQueryParam('id');
        if (!traineeId) {
            showError('Trainee ID is required in the URL (e.g., ?trainee_id=123)');
            document.getElementById('formContent').classList.add('hidden');
        } else {
            loadTrainee(traineeId);
        }

        document.getElementById('printBtn').addEventListener('click', () => window.print());

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString();
        }

        function displayValue(value) {
            if (value === null || value === undefined || value === '') return '&nbsp;';
            return String(value);
        }

        function field(label, value, spanClass = 'md:col-span-3') {
            return `
                <div class="${spanClass}">
                    <p class="text-xs font-semibold uppercase tracking-[0.08em] text-slate-500">${label}</p>
                    <p class="field-value">${displayValue(value)}</p>
                </div>
            `;
        }

        function sectionTitle(index, title) {
            return `<h2 class="mt-6 border-b border-blue-100 pb-2 text-base font-bold text-blue-700">${index}. ${title}</h2>`;
        }

        async function loadTrainee(id) {
            try {
                const res = await axios.get(`/Hohoo-ville/api/role/trainer/trainee_details.php?trainee_id=${id}`);
                if (!res.data.success) {
                    showError(res.data.message || 'Failed to load trainee');
                    return;
                }

                const profile = res.data.data.profile;
                const enrollmentStatus = profile.enrollment_status || profile.status || '';
                if (enrollmentStatus !== 'approved') {
                    showError('This trainee is not approved. Only approved registrations can be printed. Current status: ' + enrollmentStatus);
                    return;
                }

                renderForm(profile, res.data.data);
            } catch (err) {
                console.error(err);
                showError('An error occurred while loading data.');
            }
        }

        function showError(msg) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function renderForm(profile, data) {
            const d = profile;
            const ftr = data.profile;
            const course = ftr.course_name || '';
            const batch = ftr.batch_name || '';
            const digitalSig = data.profile.digital_signature || '';
            const photoFile = d.photo_file || '';

            const photoSrc = photoFile
                ? ((photoFile.startsWith('data:') || photoFile.startsWith('http'))
                    ? photoFile
                    : (window.location.origin + '/hohoo-ville/uploads/trainees/' + encodeURIComponent(photoFile)))
                : '';

            let digitalSigSrc = '';
            if (digitalSig) {
                if (digitalSig.startsWith('data:') || digitalSig.startsWith('http')) {
                    digitalSigSrc = digitalSig;
                } else {
                    digitalSigSrc = window.location.origin + '/hohoo-ville/uploads/trainees/' + encodeURIComponent(digitalSig);
                }
            }

            const html = `
                <div class="grid grid-cols-1 items-start gap-4 md:grid-cols-12">
                    <div class="text-center md:col-span-9">
                        <h3 class="text-lg font-bold text-slate-900">Hohoo-Ville Technical School</h3>
                        <p class="text-sm text-slate-600">Application / Registration Form</p>
                    </div>
                    <div class="md:col-span-3 md:justify-self-end">
                        ${photoSrc ? `<img src="${photoSrc}" alt="Photo" class="max-h-32 w-auto rounded-md border border-slate-200 bg-white p-1" />` : ''}
                    </div>
                </div>

                ${sectionTitle(1, 'Personal Information')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('Last Name', d.last_name || d.name || '', 'md:col-span-3')}
                    ${field('First Name', d.first_name || '', 'md:col-span-3')}
                    ${field('Middle Name', d.middle_name || '', 'md:col-span-3')}
                    ${field('Extension', d.extension_name || '', 'md:col-span-3')}
                    ${field('Sex', d.sex || '', 'md:col-span-3')}
                    ${field('Civil Status', d.civil_status || '', 'md:col-span-3')}
                    ${field('Birthdate', d.birthdate ? formatDate(d.birthdate) : '', 'md:col-span-3')}
                    ${field('Age', d.age || '', 'md:col-span-3')}
                    ${field('Email Address', d.email || '', 'md:col-span-6')}
                    ${field('Facebook Account', d.facebook_account || '', 'md:col-span-6')}
                </div>

                ${sectionTitle(2, 'Contact & Address')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('House No. / Street', d.house_no_street || '', 'md:col-span-4')}
                    ${field('Barangay', d.barangay || '', 'md:col-span-4')}
                    ${field('City / Municipality', d.city_municipality || '', 'md:col-span-4')}
                    ${field('Province', d.province || '', 'md:col-span-4')}
                    ${field('Region', d.region || '', 'md:col-span-4')}
                    ${field('Contact Number', d.phone_number || '', 'md:col-span-4')}
                </div>

                ${sectionTitle(3, 'Course / Training Details')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('Qualification / Course', course, 'md:col-span-6')}
                    ${field('Batch', batch, 'md:col-span-6')}
                    ${field('Scholarship Type', d.scholarship_type || '', 'md:col-span-6')}
                </div>

                ${sectionTitle(4, 'Education & Employment')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('Educational Attainment', d.educational_attainment || '', 'md:col-span-6')}
                    ${field('Employment Status', d.employment_status || '', 'md:col-span-6')}
                    ${field('Employment Type', d.employment_type || '', 'md:col-span-6')}
                    ${field('Learner Classification', d.learner_classification || '', 'md:col-span-6')}
                    ${field('Person with Disability (PWD)', d.is_pwd ? (d.is_pwd == 'yes' || d.is_pwd == 1 ? 'Yes' : d.is_pwd) : 'No', 'md:col-span-6')}
                    ${field('Disability Type', d.disability_type || '', 'md:col-span-3')}
                    ${field('Disability Cause', d.disability_cause || '', 'md:col-span-3')}
                </div>

                ${sectionTitle(5, 'Requirements')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('Valid ID', d.valid_id_file ? 'Attached' : 'N/A', 'md:col-span-4')}
                    ${field('Birth Certificate', d.birth_cert_file ? 'Attached' : 'N/A', 'md:col-span-4')}
                    ${field('Photo', d.photo_file ? 'Attached' : 'N/A', 'md:col-span-4')}
                </div>

                ${sectionTitle(6, 'Privacy Consent & Declaration')}
                <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-12">
                    ${field('Privacy consent', d.privacy_consent ? 'Yes' : 'No', 'md:col-span-6')}
                </div>

                ${sectionTitle(7, 'Signature')}
                <div class="mt-3 grid grid-cols-1 items-end gap-4 md:grid-cols-12">
                    <div class="md:col-span-6">
                        <p class="text-xs font-semibold uppercase tracking-[0.08em] text-slate-500">Digital Signature</p>
                        ${digitalSigSrc
                            ? `<img src="${digitalSigSrc}" alt="Digital Signature" class="mt-2 max-h-36 w-auto rounded-md border border-slate-200 bg-white p-2" />`
                            : '<p class="field-value">No signature</p>'}
                    </div>
                    <div class="md:col-span-6 md:justify-self-end md:min-w-[16rem]">
                        ${field('Date Submitted', d.enrollment_date ? formatDate(d.enrollment_date) : '', 'md:col-span-12')}
                    </div>
                </div>

                <div class="mt-6 border-t border-slate-200 pt-4 text-xs text-slate-500">
                    This is a system-generated printable copy of the approved registration. For edits, use the User Management / Enrollment modules.
                </div>
            `;

            document.getElementById('formContent').innerHTML = html;
        }
    </script>
</body>
</html>
