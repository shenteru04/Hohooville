<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Registrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        .notification-item.unread { background: #eff6ff; font-weight: 700; }
        .notification-time { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
        .notifications-list { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebarOverlay" class="fixed inset-0 z-20 hidden bg-slate-900/40 opacity-0 transition-opacity lg:hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 flex w-72 -translate-x-full flex-col border-r border-blue-100 bg-white/95 shadow-xl shadow-blue-100/40 backdrop-blur transition-transform duration-300 ease-in-out lg:translate-x-0">
            <div class="flex h-16 items-center gap-3 border-b border-blue-100 bg-gradient-to-r from-blue-600 to-blue-500 px-4 text-white">
                <img src="../../../../img/logo.jpg" alt="Hohooville Logo" class="h-8 w-8 rounded-lg bg-white/20 p-1">
                <div class="leading-tight">
                    <p class="text-lg font-semibold">Hohooville</p>
                    <p class="text-[11px] text-blue-100">Registrar Portal</p>
                </div>
            </div>

            <div class="scrollbar-hide flex-1 overflow-y-auto py-4">
                <nav class="space-y-2 px-4">
                    <p class="mb-2 px-4 text-[11px] font-semibold uppercase tracking-[0.2em] text-blue-400">Menu</p>
                    <a href="/Hohoo-ville/frontend/html/registrar/registrar_dashboard.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-chart-pie h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Dashboard
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/trainee_application_list.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-file-signature h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Applications
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/manage_application_form.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-clipboard-list h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Application Form
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/create_qualification.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-book-open h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Qualifications
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/add_trainer.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-chalkboard-teacher h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Trainers
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/manage_batches.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-layer-group h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Batches
                    </a>
                    <a href="/Hohoo-ville/frontend/html/registrar/pages/schedule.html" class="group flex items-center gap-3 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-colors hover:bg-blue-50/70 hover:text-blue-700">
                        <i class="fas fa-calendar-alt h-5 w-5 text-slate-400 group-hover:text-blue-600"></i> Schedule
                    </a>
                </nav>
            </div>

            <div class="border-t border-blue-100 p-4">
                <button id="sidebarCloseBtn" class="w-full rounded-lg border border-blue-200 bg-white px-4 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 lg:hidden">
                    Close Menu
                </button>
            </div>
        </aside>

        <div class="main-content flex min-w-0 flex-1 flex-col overflow-hidden lg:ml-72" id="content">
            <header class="z-10 border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
                <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                    <div class="flex items-center gap-3">
                        <button id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 lg:hidden">
                            <i class="fas fa-bars text-lg"></i>
                        </button>
                        <h1 class="text-xl font-semibold text-slate-800">Notifications</h1>
                    </div>

                    <div class="relative">
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <button id="notificationBtn" class="relative rounded-lg border border-blue-100 bg-white p-2 text-slate-600 hover:bg-blue-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Notifications">
                                    <i class="fas fa-bell"></i>
                                    <span id="notificationBadge" class="absolute -right-1 -top-1 hidden h-[18px] min-w-[18px] items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white"></span>
                                </button>
                                <div id="notificationDropdown" class="absolute right-0 z-40 mt-2 hidden w-80 max-w-[90vw] origin-top-right rounded-xl border border-blue-100 bg-white opacity-0 shadow-xl shadow-blue-100/40 transition-all duration-200 scale-95">
                                    <div id="notificationList" class="max-h-96 overflow-y-auto">
                                        <div class="px-4 py-3 text-center text-sm text-slate-500">No notifications</div>
                                    </div>
                                </div>
                            </div>

                            <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
                                <i class="fas fa-user-circle text-xl text-blue-500"></i>
                                <span id="userName" class="hidden md:block">Registrar</span>
                                <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                            </button>
                            <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                                <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                                <div class="border-t border-blue-100"></div>
                                <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto bg-gradient-to-b from-blue-50/60 via-white to-slate-50 p-4 sm:p-6 lg:p-8">
                <div class="mx-auto w-full max-w-7xl space-y-6">
                    <section>
                        <h2 class="text-2xl font-semibold text-slate-900">Notifications</h2>
                    </section>

                    <section class="overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-sm">
                        <div class="p-4 sm:p-6">
                            <div id="notificationsContainer" class="notifications-list divide-y divide-slate-200 rounded-lg border border-slate-200">
                                <div class="px-4 py-6 text-center text-sm text-slate-500">Loading...</div>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/notifications.js"></script>
    <script>
        const API_URL = window.location.origin + '/Hohoo-ville/api/notifications.php?action=get&role=registrar';

        function loadAll() {
            fetch(API_URL)
                .then((response) => response.json())
                .then((data) => renderAll(data))
                .catch(() => {
                    document.getElementById('notificationsContainer').innerHTML = '<div class="px-4 py-6 text-center text-sm text-slate-500">Failed to load</div>';
                });
        }

        function renderAll(items) {
            const cont = document.getElementById('notificationsContainer');
            if (!items || items.length === 0) {
                cont.innerHTML = '<div class="px-4 py-6 text-center text-sm text-slate-500">No notifications</div>';
                return;
            }

            cont.innerHTML = '';
            items.forEach((it) => {
                const item = document.createElement('a');
                item.href = it.link || '#';
                item.className = 'notification-item flex items-start justify-between gap-3 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 ' + (it.is_read ? '' : 'unread');
                item.innerHTML = `<div>${it.message}</div><div class="notification-time">${it.time}</div>`;
                item.addEventListener('click', (event) => {
                    event.preventDefault();
                    fetch(window.location.origin + '/Hohoo-ville/api/notifications.php?action=markRead&id=' + encodeURIComponent(it.id)).catch(() => {});
                    if (it.link) window.location.href = it.link;
                });
                cont.appendChild(item);
            });
        }

        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const sidebarCollapse = document.getElementById('sidebarCollapse');
            const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
            if (!sidebar) return;

            function openSidebar() {
                sidebar.classList.remove('-translate-x-full');
                if (sidebarOverlay) {
                    sidebarOverlay.classList.remove('hidden');
                    requestAnimationFrame(() => sidebarOverlay.classList.remove('opacity-0'));
                }
                document.body.classList.add('overflow-hidden');
            }

            function closeSidebar() {
                sidebar.classList.add('-translate-x-full');
                if (sidebarOverlay) {
                    sidebarOverlay.classList.add('opacity-0');
                    setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
                }
                document.body.classList.remove('overflow-hidden');
            }

            if (sidebarCollapse) sidebarCollapse.addEventListener('click', openSidebar);
            if (sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', closeSidebar);
            if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);
        }

        function initUserDropdown() {
            const button = document.getElementById('userDropdown');
            const menu = document.getElementById('userDropdownMenu');
            if (!button || !menu) return;

            button.addEventListener('click', (event) => {
                event.stopPropagation();
                menu.classList.toggle('hidden');
            });

            document.addEventListener('click', (event) => {
                if (!event.target.closest('#userDropdown') && !event.target.closest('#userDropdownMenu')) {
                    menu.classList.add('hidden');
                }
            });
        }

        function hydrateHeaderUser() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const userName = document.getElementById('userName');
                if (!userName) return;
                const displayName = [user.first_name, user.last_name].filter(Boolean).join(' ').trim() || user.full_name || user.name || user.username || 'Registrar';
                userName.textContent = displayName;
            } catch (error) {
                console.warn('Unable to parse user in localStorage:', error);
            }
        }

        function initLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (!logoutBtn) return;
            logoutBtn.addEventListener('click', (event) => {
                event.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '../../../login.html';
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            initUserDropdown();
            hydrateHeaderUser();
            initLogout();
            loadAll();
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
</body>
</html>
