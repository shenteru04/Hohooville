<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Settings</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <section>
                <h2 class="text-2xl font-semibold text-slate-900">System Settings</h2>
                <p class="mt-1 text-sm text-slate-500">Manage your account credentials and base system configuration.</p>
            </section>

            <section class="grid grid-cols-1 gap-6 xl:grid-cols-3">
                <div class="space-y-6 xl:col-span-2">
                    <article class="rounded-2xl border border-blue-100 bg-white p-5 shadow-sm sm:p-6">
                        <h3 class="mb-4 text-base font-semibold text-slate-900">Account Settings</h3>
                        <form id="accountSettingsForm" class="space-y-4">
                            <div>
                                <label for="currentPassword" class="mb-1 block text-sm font-medium text-slate-700">Current Password</label>
                                <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="currentPassword" required>
                            </div>
                            <div>
                                <label for="newPassword" class="mb-1 block text-sm font-medium text-slate-700">New Password</label>
                                <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newPassword" required>
                            </div>
                            <div>
                                <label for="confirmPassword" class="mb-1 block text-sm font-medium text-slate-700">Confirm New Password</label>
                                <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="confirmPassword" required>
                            </div>
                            <div class="flex justify-end">
                                <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
                                    <i class="fas fa-lock"></i> Change Password
                                </button>
                            </div>
                        </form>
                    </article>

                    <article class="rounded-2xl border border-blue-100 bg-white p-5 shadow-sm sm:p-6">
                        <h3 class="mb-4 text-base font-semibold text-slate-900">System Defaults</h3>
                        <form id="systemSettingsForm" class="space-y-4">
                            <div>
                                <label for="sessionTimeout" class="mb-1 block text-sm font-medium text-slate-700">Session Timeout (minutes)</label>
                                <input type="number" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="sessionTimeout" value="60">
                            </div>
                            <label for="emailNotifications" class="inline-flex cursor-pointer items-center gap-3 rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700">
                                <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" id="emailNotifications" checked>
                                Enable Email Notifications
                            </label>
                            <div class="flex justify-end">
                                <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
                                    <i class="fas fa-save"></i> Save Settings
                                </button>
                            </div>
                        </form>
                    </article>
                </div>

                <article class="rounded-2xl border border-blue-100 bg-white p-5 shadow-sm sm:p-6">
                    <h3 class="mb-4 text-base font-semibold text-slate-900">Quick Actions</h3>
                    <div class="space-y-3">
                        <button class="inline-flex w-full items-center justify-center gap-2 rounded-lg border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="backupDataBtn">
                            <i class="fas fa-database"></i> Backup Data
                        </button>
                        <button class="inline-flex w-full items-center justify-center gap-2 rounded-lg border border-amber-200 bg-amber-50 px-4 py-2 text-sm font-semibold text-amber-700 hover:bg-amber-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" id="clearCacheBtn">
                            <i class="fas fa-broom"></i> Clear Cache
                        </button>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/admin/pages/settings.js"></script>
</body>
</html>
