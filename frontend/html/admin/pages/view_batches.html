<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Management - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Batch Management</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Open Batches</h2>
                    <div class="flex items-center gap-2">
                        <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-blue-700" id="createBatchBtn">
                            <i class="fas fa-plus"></i> Create New Batch
                        </button>
                        <button class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-slate-50" id="openClosedBatches">
                            <i class="fas fa-eye"></i> View Closed Batches
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto p-5">
                    <table class="min-w-full divide-y divide-slate-200" id="batchesTable" data-table-manager="true" data-filters="Status:1" data-filter-auto-options="true">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Batch Name</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Status</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Enrolled Trainees</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">View</th>
                                <th class="px-3 py-3 text-center text-xs font-semibold uppercase tracking-wider text-slate-600">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="batchesTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </article>
        </main>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="closedBatchesModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="closedBatchesModal"></div>
        <div class="relative z-10 w-full max-w-4xl overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900">Closed Batches</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="closedBatchesModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="max-h-[70vh] overflow-y-auto p-5">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200" id="closedBatchesTable" data-table-manager="true" data-filters="Status:1" data-filter-auto-options="true">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Batch Name</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Status</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Enrolled Trainees</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">View</th>
                                <th class="px-3 py-3 text-center text-xs font-semibold uppercase tracking-wider text-slate-600">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="closedBatchesTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
            <div class="flex justify-end border-t border-blue-100 px-5 py-4">
                <button type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" data-modal-hide="closedBatchesModal">Close</button>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="viewTraineesModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="viewTraineesModal"></div>
        <div class="relative z-10 w-full max-w-4xl overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-start justify-between border-b border-blue-100 bg-slate-50 px-5 py-4">
                <div>
                    <h3 class="text-lg font-semibold text-slate-900">Trainees List</h3>
                    <p class="text-sm text-slate-500">Batch: <span id="modalBatchName" class="font-semibold text-slate-700"></span></p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-sm font-semibold text-blue-700" id="modalTraineeCount">0</span>
                    <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="viewTraineesModal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <div class="max-h-[70vh] overflow-y-auto p-5">
                <div class="mb-3 flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2">
                    <i class="fas fa-search text-slate-400"></i>
                    <input type="text" class="w-full border-0 bg-transparent p-0 text-sm text-slate-700 placeholder-slate-400 focus:outline-none" id="modalSearchInput" placeholder="Search by name, email, or ID...">
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200" id="modalTraineesTable" data-table-manager="true" data-search-input="modalSearchInput" data-filters="Status:4" data-filter-auto-options="true">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">School ID</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Name</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Email</th>
                                <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Enrolled Date</th>
                                <th class="px-3 py-3 text-center text-xs font-semibold uppercase tracking-wider text-slate-600">Status</th>
                            </tr>
                        </thead>
                        <tbody id="modalTraineesBody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
            <div class="flex justify-end border-t border-blue-100 px-5 py-4">
                <button type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" data-modal-hide="viewTraineesModal">Close</button>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="createBatchModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="createBatchModal"></div>
        <div class="relative z-10 w-full max-w-2xl overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900">Create New Batch</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="createBatchModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="max-h-[80vh] overflow-y-auto p-5">
                <form id="createBatchForm" class="space-y-4">
                    <input type="hidden" id="newBatchId" value="">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Qualification <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchQualificationId" required>
                                <option value="">Select Qualification</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Batch Name</label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchName" placeholder="e.g. Batch 1 - 2024" readonly>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Trainer <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchTrainerId" required>
                                <option value="">Select Trainer</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Scholarship Type</label>
                            <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchScholarshipType">
                                <option value="">None</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Start Date <span class="text-rose-600">*</span></label>
                            <input type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchStartDate" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">End Date <span class="text-rose-600">*</span></label>
                            <input type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchEndDate" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Max Trainees</label>
                            <input type="number" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchMaxTrainees" min="1" placeholder="e.g. 25">
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Status <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newBatchStatus" required>
                                <option value="open">Open</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>

            <div class="flex justify-end gap-2 border-t border-blue-100 px-5 py-4">
                <button type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" data-modal-hide="createBatchModal">Close</button>
                <button type="submit" form="createBatchForm" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">Create Batch</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/table_manager.js"></script>
    <script src="../../../js/admin/pages/view_batches.js"></script>
    <script src="../../../js/sidebar.js"></script>
</body>
</html>
