<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualification Management - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Qualification Management</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <section class="flex items-center justify-between">
                <h2 class="text-2xl font-semibold text-slate-900">Qualifications</h2>
                <div class="flex items-center gap-3">
                    <button id="openQualificationModalBtn" class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
                        <i class="fas fa-plus"></i> Add New Qualification
                    </button>
                    <button id="viewArchivedBtn" class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                        <i class="fas fa-box-archive"></i> View Archived
                    </button>
                </div>
            </section>

            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h3 class="text-base font-semibold text-slate-900">Qualifications List</h3>
                </div>
                <div class="p-5">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200" id="qualificationsTable" data-table-manager="true" data-filters="Status:4" data-filter-auto-options="true">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Course Name</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">NC Level</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">CTPR No.</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Cost</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Duration</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Status</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="qualificationsTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div id="addQualificationModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="addQualificationModal"></div>
        <div class="relative z-10 w-full max-w-2xl rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900" id="addQualificationModalLabel">Add New Qualification</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="addQualificationModal" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-5">
                <form id="qualificationForm" class="space-y-4">
                    <input type="hidden" id="qualificationId">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label for="courseName" class="mb-1 block text-sm font-medium text-slate-700">Course Name <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="courseName" required>
                        </div>
                        <div>
                            <label for="ncLevel" class="mb-1 block text-sm font-medium text-slate-700">NC Level <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="ncLevel" required>
                                <option value="">-- Select NC Level --</option>
                                <option value="1">NC I</option>
                                <option value="2">NC II</option>
                                <option value="3">NC III</option>
                                <option value="4">NC IV</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label for="ctprNumber" class="mb-1 block text-sm font-medium text-slate-700">CTPR Number</label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="ctprNumber">
                        </div>
                        <div>
                            <label for="trainingCost" class="mb-1 block text-sm font-medium text-slate-700">Training Cost</label>
                            <input type="number" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="trainingCost" step="0.01">
                        </div>
                    </div>
                    <div>
                        <label for="duration" class="mb-1 block text-sm font-medium text-slate-700">Duration <span class="text-rose-600">*</span></label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="duration" placeholder="e.g., 6 months" required>
                    </div>
                    <div>
                        <label for="description" class="mb-1 block text-sm font-medium text-slate-700">Description</label>
                        <textarea class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="description" rows="3"></textarea>
                    </div>
                    <div class="flex flex-wrap justify-end gap-2">
                        <button type="button" class="hidden rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" id="cancelBtn">Cancel</button>
                        <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700" id="submitBtn">Add Qualification</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/table_manager.js"></script>
    <script src="../../../js/admin/pages/manage_qualifications.js"></script>
</body>
</html>
