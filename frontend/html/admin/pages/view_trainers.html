<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Trainers - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Trainer Management</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700" id="createTrainerBtn">
                    <i class="fas fa-user-plus"></i> Create New Trainer
                </button>
            </div>

            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Trainers List</h2>
                </div>
                <div class="space-y-4 p-5">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <label for="filterTooManyQualifications" class="inline-flex items-center gap-2 text-sm text-slate-700">
                            <input class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" type="checkbox" id="filterTooManyQualifications">
                            Show only trainers with 2+ qualifications
                        </label>
                        <p class="text-sm text-slate-500">
                            Trainers with 2+ qualifications: <span id="tooManyQualificationsCount" class="font-semibold text-slate-700">0</span>
                        </p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200" id="trainersTable" data-table-manager="true" data-filters="Status:3" data-filter-auto-options="true">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Name</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Email</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Qualifications</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">NC Level</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Status</th>
                                    <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-600">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="trainersTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="accountModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="accountModal"></div>
        <div class="relative z-10 w-full max-w-md rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900">Create Trainer Account</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="accountModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-5">
                <form id="accountForm" class="space-y-4">
                    <input type="hidden" id="accTrainerId">
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Username <span class="text-rose-600">*</span></label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="accUsername" required>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Password <span class="text-rose-600">*</span></label>
                        <input type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="accPassword" required>
                    </div>
                    <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
                        <i class="fas fa-key"></i> Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="editModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="editModal"></div>
        <div class="relative z-10 w-full max-w-xl rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900">Edit Trainer</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="editModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-5">
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="editTrainerId">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">First Name</label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="editFirstName" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Last Name</label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="editLastName" required>
                        </div>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
                        <input type="email" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="editEmail" required>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Phone</label>
                        <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="editPhone">
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Specialization / Qualification</label>
                        <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="editQualificationId" required>
                            <option value="">Select Qualification</option>
                        </select>
                    </div>
                    <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
                        <i class="fas fa-save"></i> Update Trainer
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4" id="createTrainerModal" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/50" data-modal-hide="createTrainerModal"></div>
        <div class="relative z-10 w-full max-w-5xl overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
                <h3 class="text-lg font-semibold text-slate-900" id="createTrainerModalTitle">Create New Trainer</h3>
                <button type="button" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800" data-modal-hide="createTrainerModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="max-h-[80vh] overflow-y-auto p-5">
                <form id="createTrainerForm" enctype="multipart/form-data" class="space-y-4">
                    <input type="hidden" id="currentTrainerId">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">First Name <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newTrainerFirstName" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Last Name <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newTrainerLastName" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Email <span class="text-rose-600">*</span></label>
                            <input type="email" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newTrainerEmail" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">Phone <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newTrainerPhone" required>
                        </div>
                    </div>
                    <div>
                        <div class="mb-2 flex items-center justify-between">
                            <label class="text-sm font-medium text-slate-700">Qualifications <span class="text-rose-600">*</span></label>
                            <button type="button" class="inline-flex items-center gap-1 rounded-lg border border-blue-200 bg-white px-3 py-1.5 text-xs font-semibold text-blue-700 hover:bg-blue-50" id="addNewQualificationBtn">
                                <i class="fas fa-plus"></i> Add Qualification
                            </button>
                        </div>
                        <div id="newQualificationsContainer"></div>
                    </div>

                    <h5 class="pt-2 text-base font-semibold text-slate-900">Address</h5>
                    <div class="grid grid-cols-1 gap-2 md:grid-cols-3">
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">Province <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrProvince" required>
                                <option value="">Select Province</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">City / Municipality <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrCity" required>
                                <option value="">Select City/Municipality</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">Region <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrRegion" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-2 md:grid-cols-3">
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">Barangay <span class="text-rose-600">*</span></label>
                            <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrBarangay" required>
                                <option value="">Select Barangay</option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">District <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrDistrict" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-xs font-medium text-slate-600">House No. / Street <span class="text-rose-600">*</span></label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newAddrHouse" required>
                        </div>
                    </div>
                    <input type="hidden" id="newAddress">

                    <h5 class="pt-2 text-base font-semibold text-slate-900">Certifications & Documents</h5>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">NTTC Number</label>
                            <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newNttcNo">
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700">NTTC File</label>
                            <input type="file" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 file:mr-3 file:rounded-md file:border-0 file:bg-blue-50 file:px-3 file:py-1.5 file:text-xs file:font-semibold file:text-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newNttcFile" accept=".pdf,.jpg,.png">
                            <div id="newNttcFileCurrent" class="mt-1 text-xs text-slate-500"></div>
                        </div>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Trainer Methodology (TM) Certificate <span class="text-rose-600">*</span></label>
                        <input type="file" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 file:mr-3 file:rounded-md file:border-0 file:bg-blue-50 file:px-3 file:py-1.5 file:text-xs file:font-semibold file:text-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="newTmFile" accept=".pdf,.jpg,.png" required>
                        <div id="newTmFileCurrent" class="mt-1 text-xs text-slate-500"></div>
                    </div>
                </form>
            </div>

            <div class="flex justify-end gap-2 border-t border-blue-100 px-5 py-4">
                <button type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" data-modal-hide="createTrainerModal">Close</button>
                <button type="submit" form="createTrainerForm" id="createTrainerSubmitBtn" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">Create Trainer</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/table_manager.js"></script>
    <script src="../../../js/admin/pages/view_trainers.js"></script>
    <script src="../../../js/sidebar.js"></script>
</body>
</html>
