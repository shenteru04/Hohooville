<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Manage Rooms</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Room Management</h2>
                </div>
                <div class="space-y-5 p-5">
                    <!-- Search and Filter Section -->
                    <div class="mb-6 space-y-4">
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    id="searchRooms" 
                                    placeholder="Search rooms by name, description, or qualification..." 
                                    class="w-full rounded-lg border border-slate-300 bg-white py-2 pl-10 pr-3 text-sm text-slate-800 placeholder-slate-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
                                >
                            </div>
                            <button id="clearSearchBtn" class="inline-flex items-center gap-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
                                <i class="fas fa-times"></i> Clear
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button id="viewModeBtn" class="inline-flex items-center gap-2 rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-100">
                                <i class="fas fa-calendar"></i> Schedule View
                            </button>
                            <button id="classicModeBtn" class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                                <i class="fas fa-th-large"></i> Classic View
                            </button>
                        </div>
                    </div>

                    <!-- Create Room Form -->
                    <form id="roomForm" class="space-y-4 rounded-lg border border-slate-200 bg-slate-50 p-4">
                        <h3 class="font-semibold text-slate-900">Create New Room</h3>
                        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                            <div>
                                <label for="roomName" class="mb-1 block text-sm font-medium text-slate-700">Room Name</label>
                                <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="roomName" required>
                            </div>
                            <div>
                                <label for="roomDescription" class="mb-1 block text-sm font-medium text-slate-700">Room Description</label>
                                <input type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="roomDescription">
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
                                <i class="fas fa-plus"></i> Create Room
                            </button>
                        </div>
                    </form>

                    <!-- Room List Section -->
                    <section id="roomList"></section>
                </div>
            </article>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/admin/pages/manage_rooms.js"></script>
</body>
</html>
