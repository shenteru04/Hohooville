<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Profile</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <section class="overflow-hidden rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="h-28 bg-gradient-to-r from-blue-600 to-blue-500 sm:h-32"></div>
                <div class="-mt-12 p-5 sm:p-6">
                    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                        <div class="flex items-end gap-4">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=random" id="profileAvatar" class="h-24 w-24 rounded-full border-4 border-white object-cover shadow-md" alt="Profile">
                            <div>
                                <h2 class="text-2xl font-semibold text-slate-900" id="headerName">Loading...</h2>
                                <p class="mt-1 inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-slate-700" id="headerRole">...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="grid grid-cols-1 gap-6 xl:grid-cols-3">
                <article class="rounded-2xl border border-blue-100 bg-white p-5 shadow-sm sm:p-6">
                    <h3 class="mb-4 flex items-center gap-2 text-base font-semibold text-slate-900">
                        <i class="fas fa-info-circle text-blue-600"></i>
                        Personal Information
                    </h3>
                    <div class="space-y-4">
                        <div class="border-b border-slate-100 pb-3">
                            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Email Address</p>
                            <p class="mt-1 text-sm text-slate-900" id="displayEmail">...</p>
                        </div>
                        <div class="border-b border-slate-100 pb-3">
                            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Phone Number</p>
                            <p class="mt-1 text-sm text-slate-900" id="displayPhone">...</p>
                        </div>
                        <div>
                            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Username</p>
                            <p class="mt-1 text-sm text-slate-900" id="displayUsername">...</p>
                        </div>
                    </div>
                </article>

                <article class="rounded-2xl border border-blue-100 bg-white p-5 shadow-sm sm:p-6 xl:col-span-2">
                    <h3 class="mb-4 flex items-center gap-2 text-base font-semibold text-slate-900">
                        <i class="fas fa-user-edit text-blue-600"></i>
                        Edit Profile
                    </h3>
                    <form id="profileForm" class="space-y-4">
                        <input type="hidden" id="userId">
                        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                            <div>
                                <label class="mb-1 block text-sm font-medium text-slate-700" for="firstName">First Name</label>
                                <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="firstName" type="text" placeholder="Enter your first name" required>
                            </div>
                            <div>
                                <label class="mb-1 block text-sm font-medium text-slate-700" for="lastName">Last Name</label>
                                <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="lastName" type="text" placeholder="Enter your last name" required>
                            </div>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700" for="email">Email Address</label>
                            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="email" type="email" placeholder="Enter your email address" required>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700" for="phone">Phone Number</label>
                            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="phone" type="tel" placeholder="Enter your phone number">
                        </div>
                        <div class="flex justify-end">
                            <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" type="submit" id="submitBtn">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </article>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/admin/pages/profile.js"></script>
</body>
</html>
