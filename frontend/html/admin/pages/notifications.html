<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        .notifications-list { max-height: 62vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Notifications</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">All Notifications</h2>
                </div>
                <div class="p-5">
                    <div id="notificationsContainer" class="notifications-list divide-y divide-slate-100 overflow-hidden rounded-lg border border-slate-200 bg-white">
                        <div class="px-4 py-4 text-center text-sm text-slate-500">Loading...</div>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script>
        const API_URL = `${window.location.origin}/Hohoo-ville/api/notifications.php?action=get&role=admin`;
        const MARK_READ_BASE = `${window.location.origin}/Hohoo-ville/api/notifications.php?action=markRead&id=`;

        function initUserDropdown() {
            const button = document.getElementById('userDropdown');
            const menu = document.getElementById('userDropdownMenu');
            if (!button || !menu) return;

            button.addEventListener('click', (event) => {
                event.stopPropagation();
                menu.classList.toggle('hidden');
            });

            document.addEventListener('click', (event) => {
                if (!event.target.closest('#userDropdown') && !event.target.closest('#userDropdownMenu')) {
                    menu.classList.add('hidden');
                }
            });
        }

        function initLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (!logoutBtn) return;
            logoutBtn.addEventListener('click', (event) => {
                event.preventDefault();
                if (typeof window.logout === 'function') {
                    window.logout();
                    return;
                }
                localStorage.clear();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.clear();
            window.location.href = '/hohoo-ville/frontend/login.html';
            });
        }

    async function authenticatedFetch(url, options = {}) {
        const token = localStorage.getItem('token');
        const headers = { ...options.headers };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        return fetch(url, { ...options, headers });
    }

        function loadAll() {
        authenticatedFetch(API_URL)
                .then((response) => response.json())
                .then((data) => renderAll(Array.isArray(data) ? data : []))
                .catch(() => {
                    const container = document.getElementById('notificationsContainer');
                    if (!container) return;
                    container.innerHTML = '<div class="px-4 py-4 text-center text-sm text-slate-500">Failed to load notifications.</div>';
                });
        }

        function renderAll(items) {
            const container = document.getElementById('notificationsContainer');
            if (!container) return;

            if (!items.length) {
                container.innerHTML = '<div class="px-4 py-4 text-center text-sm text-slate-500">No notifications</div>';
                return;
            }

            container.innerHTML = '';
            items.forEach((item) => {
                const row = document.createElement('a');
                row.href = item.link || '#';
                row.className = `block px-4 py-3 transition hover:bg-slate-50 ${item.is_read ? 'bg-white text-slate-700' : 'bg-blue-50 font-semibold text-slate-900'}`;

                const wrap = document.createElement('div');
                wrap.className = 'flex items-start justify-between gap-3';

                const message = document.createElement('div');
                message.className = 'text-sm leading-5';
                message.textContent = item.message || 'Notification';

                const time = document.createElement('div');
                time.className = 'shrink-0 text-xs text-slate-500';
                time.textContent = item.time || '';

                wrap.appendChild(message);
                wrap.appendChild(time);
                row.appendChild(wrap);

                row.addEventListener('click', (event) => {
                    event.preventDefault();
                    if (item.id) {
                        authenticatedFetch(`${MARK_READ_BASE}${encodeURIComponent(item.id)}`).catch(() => {});
                    }
                    if (item.link) {
                        window.location.href = item.link;
                    }
                });

                container.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initUserDropdown();
            initLogout();
            loadAll();
        });
    </script>
</body>
</html>
