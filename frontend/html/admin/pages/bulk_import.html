<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk User Import - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        .drop-zone { border: 2px dashed #3b82f6; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all .2s ease; }
        .drop-zone.dragover { border-color: #1d4ed8; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Bulk User Import</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Step 1: Select User Type</h2>
                </div>
                <div class="space-y-4 p-5">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <label for="traineeType" class="inline-flex cursor-pointer items-start gap-3 rounded-lg border border-slate-200 px-4 py-3 text-sm text-slate-700">
                            <input class="mt-0.5 h-4 w-4 border-slate-300 text-blue-600 focus:ring-blue-500" type="radio" name="userType" id="traineeType" value="trainee" checked onchange="updateTemplate()">
                            <span><strong class="text-slate-900">Trainee</strong> - Import trainee records in bulk</span>
                        </label>
                        <label for="trainerType" class="inline-flex cursor-pointer items-start gap-3 rounded-lg border border-slate-200 px-4 py-3 text-sm text-slate-700">
                            <input class="mt-0.5 h-4 w-4 border-slate-300 text-blue-600 focus:ring-blue-500" type="radio" name="userType" id="trainerType" value="trainer" onchange="updateTemplate()">
                            <span><strong class="text-slate-900">Trainer</strong> - Import trainer records in bulk</span>
                        </label>
                    </div>
                    <button class="inline-flex items-center gap-2 rounded-lg bg-sky-600 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-700" onclick="downloadTemplate()">
                        <i class="fas fa-download"></i> Download CSV Template
                    </button>
                </div>
            </article>

            <article class="rounded-2xl border border-blue-100 bg-white shadow-sm">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Step 2: Upload CSV File</h2>
                </div>
                <div class="p-5">
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt mb-3 text-4xl text-blue-600"></i>
                        <p class="mb-1 text-sm font-semibold text-slate-900">Drag & drop your CSV file here or click to browse</p>
                        <p class="text-xs text-slate-500">Max file size: 10MB</p>
                    </div>
                    <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleFileSelect(event)">
                </div>
            </article>

            <article class="hidden rounded-2xl border border-blue-100 bg-white shadow-sm" id="previewCard">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Step 3: Preview Data</h2>
                </div>
                <div class="space-y-4 p-5">
                    <div class="rounded-lg border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800">
                        <i class="fas fa-info-circle mr-2"></i>
                        <span id="previewInfo"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200" id="previewTable" data-table-manager="true" data-filters="Column 1:0" data-filter-auto-options="true">
                            <thead class="bg-slate-50"></thead>
                            <tbody class="divide-y divide-slate-100 bg-white"></tbody>
                        </table>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button class="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700" onclick="confirmImport()">
                            <i class="fas fa-check"></i> Confirm & Import
                        </button>
                        <button class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" onclick="resetImport()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </div>
            </article>

            <article class="hidden rounded-2xl border border-blue-100 bg-white shadow-sm" id="progressCard">
                <div class="border-b border-blue-100 px-5 py-4">
                    <h2 class="text-base font-semibold text-slate-900">Step 4: Import Progress</h2>
                </div>
                <div class="space-y-4 p-5">
                    <div class="h-3 w-full overflow-hidden rounded-full bg-slate-200">
                        <div id="progressBar" class="h-3 w-0 rounded-full bg-blue-600 transition-all duration-300"></div>
                    </div>
                    <div id="importResults"></div>
                </div>
            </article>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/table_manager.js"></script>
    <script src="../../../js/admin/pages/bulk_import.js"></script>
</body>
</html>
