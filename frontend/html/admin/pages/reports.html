<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - Hohoo-Ville Technical School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.3.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        @media print {
            .no-print, #sidebar, header { display: none !important; }
            .main-content { margin-left: 0 !important; }
        }
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="sidebar-container"></div>

    <div class="main-content min-h-screen lg:ml-72" id="content">
        <header class="border-b border-blue-100 bg-white/85 shadow-sm backdrop-blur">
            <div class="flex h-16 items-center justify-between px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" id="sidebarCollapse" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 lg:hidden">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-slate-800">Reports & Analytics</h1>
                </div>

                <div class="header-actions flex items-center gap-3" data-header-actions>
                    <div class="relative">
                        <button id="userDropdown" class="flex items-center gap-2 rounded-full border border-blue-100 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 hover:bg-blue-50">
                            <i class="fas fa-user-circle text-xl text-blue-500"></i>
                            <span id="userName" class="hidden md:block">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        <div id="userDropdownMenu" class="absolute right-0 top-full z-40 mt-2 hidden w-48 rounded-xl border border-blue-100 bg-white py-1 shadow-xl shadow-blue-100/40">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-user mr-2"></i> Profile</a>
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-cog mr-2"></i> Settings</a>
                            <div class="border-t border-blue-100"></div>
                            <a href="#" id="logoutBtn" class="block px-4 py-2 text-sm text-slate-700 hover:bg-blue-50"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="space-y-6 p-4 sm:p-6 lg:p-8">
            <section class="flex flex-wrap items-center justify-between gap-3">
                <h2 class="text-2xl font-semibold text-slate-900">Reports & Analytics</h2>
                <button class="no-print inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" id="exportReportBtn">
                    <i class="fas fa-file-export"></i> Export Excel
                </button>
            </section>

            <section class="no-print rounded-2xl border border-blue-100 bg-white p-4 shadow-sm sm:p-6">
                <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Report Type</label>
                        <select class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="reportType">
                            <option value="enrollment">Enrollment Report</option>
                            <option value="performance">Academic Performance</option>
                            <option value="attendance">Attendance Report</option>
                            <option value="financial">Financial Report</option>
                        </select>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Start Date</label>
                        <input type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="startDate">
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">End Date</label>
                        <input type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="endDate">
                    </div>
                    <div class="flex items-end">
                        <button class="inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" id="generateBtn">Generate Report</button>
                    </div>
                </div>
            </section>

            <section id="reportContent" class="space-y-6">
                <article class="rounded-2xl border border-blue-100 bg-white p-4 shadow-sm sm:p-6">
                    <h3 class="mb-4 text-base font-semibold text-slate-900">Visual Analysis</h3>
                    <div class="h-[320px] sm:h-[360px]">
                        <canvas id="reportChart" class="h-full w-full"></canvas>
                    </div>
                </article>

                <article class="rounded-2xl border border-blue-100 bg-white p-4 shadow-sm sm:p-6">
                    <h3 class="mb-4 text-base font-semibold text-slate-900">Detailed Data</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200" id="reportTable" data-table-manager="true" data-filters="Category:0" data-filter-auto-options="true">
                            <thead class="bg-slate-50"></thead>
                            <tbody class="divide-y divide-slate-100 bg-white"></tbody>
                        </table>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="../../../js/session_timeout.js"></script>
    <script src="../../../js/sidebar.js"></script>
    <script src="../../../js/table_manager.js"></script>
    <script src="../../../js/admin/pages/reports.js"></script>
</body>
</html>
