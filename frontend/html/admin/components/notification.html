<!-- Notification Dropdown Component -->
<div class="relative" id="notification-container">
    <button id="notificationBtn" type="button" class="relative rounded-lg border border-blue-100 bg-white p-2 text-slate-600 transition hover:bg-blue-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Notifications" aria-expanded="false">
        <i class="fas fa-bell"></i>
        <span id="notificationBadge" class="absolute -right-1 -top-1 hidden h-[18px] min-w-[18px] items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white">0</span>
    </button>

    <div id="notificationDropdown" class="absolute right-0 z-50 mt-2 hidden w-80 max-w-[90vw] origin-top-right rounded-xl border border-blue-100 bg-white opacity-0 shadow-xl shadow-blue-100/40 transition-all duration-200 scale-95">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-2.5">
            <strong class="text-sm font-semibold text-slate-800">Notifications</strong>
            <div class="flex items-center gap-2">
                <button id="markAllRead" class="text-xs font-medium text-blue-600 hover:text-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Mark all as read</button>
                <a href="#" id="viewAllNotifications" class="text-xs font-medium text-blue-600 hover:text-blue-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">View all</a>
            </div>
        </div>
        <div id="notificationList" class="max-h-96 overflow-y-auto">
            <div class="px-4 py-3 text-center text-sm text-slate-500">No new notifications</div>
        </div>
    </div>
</div>
