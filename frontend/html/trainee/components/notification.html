<div class="relative">
    <button id="notificationBtn" class="flex items-center text-gray-500 hover:text-blue-600 focus:outline-none transition-colors relative p-2 rounded-full hover:bg-gray-100">
        <div class="relative">
            <i class="fas fa-bell text-xl"></i>
            <span id="notificationBadge" class="absolute -top-1 -right-1 inline-flex items-center justify-center w-4 h-4 text-xs font-bold leading-none text-white bg-red-500 rounded-full hidden">0</span>
        </div>
        <i class="fas fa-chevron-down ml-1 text-xs"></i>
    </button>
    
    <div id="notificationDropdown" class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl overflow-hidden z-50 border border-gray-100 hidden origin-top-right transition-all duration-200 ease-out transform scale-95 opacity-0">
        <div id="notificationList" class="max-h-96 overflow-y-auto">
            <div class="px-4 py-3 text-center text-sm text-gray-500">Loading...</div>
        </div>
    </div>
</div>
